services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"

  ml-client:
    build: ./machine-learning-client
    container_name: ml-client
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/appdb

  web-app:
    build: ./web-app
    container_name: web-app
    depends_on:
      - mongodb
    ports:
      - "5001:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/appdb
{% extends "base.html" %}
{% block title %}SignUp - Terminal Titans{% endblock %}
{% block content %}
<div class="auth-card">
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join Terminal Titans to start tracking your focus.</p>

    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-input" required
                placeholder="Choose a username" value="{{ username or '' }}">
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" required
                placeholder="Enter your email" value="{{ email or '' }}">
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-input" required
                placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary">
            Create Account
        </button>
    </form>

    <p class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
</div>
{% endblock %}

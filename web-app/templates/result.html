{% extends 'base.html' %}

{% block title %}Classification Result{% endblock %}

{% block content %}
<div class="container">
    <div class="result-card">
        <h1>🎯 Classification Result</h1>
        
        <img src="https://via.placeholder.com/420x300?text=Plastic+Bottle" 
             style="max-width:420px; border-radius:15px; margin:20px 0;" alt="Garbage">

        <h2>Item: Plastic Bottle</h2>
        <p style="font-size:28px; color:#2e8b57; font-weight:bold;">✅ Recyclable</p>
        
        <div class="bin-icon">♻️</div>
        <h3>Please throw into <span style="color:#2196F3;">Blue Recycling Bin</span></h3>
        <p>Confidence: 92%</p>

        <div style="margin-top:30px;">
            <a href="/"><button class="btn">🔄 Classify Another</button></a>
            <a href="/history"><button class="btn btn-secondary" style="margin-left:15px;">📋 View History</button></a>
        </div>
    </div>
</div>
{% endblock %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mock Interview Recorder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>Mock Interview</h1>
        <button id="start-session" type="button">Start Interview</button>
        <p id="session-status" class="status">No active session.</p>
      </section>

      <section class="panel" id="question-panel" hidden>
        <h2>Questions</h2>
        <ol id="question-list"></ol>
      </section>

      <section class="panel" id="record-panel" hidden>
        <h2>Recorder</h2>
        <p class="status">Record one response covering both questions. Maximum time: 5 minutes.</p>
        <div class="controls">
          <button id="record-button" type="button" disabled>Start Recording</button>
          <button id="stop-button" type="button" disabled>Stop Recording</button>
        </div>
        <p id="recording-status" class="status">Waiting to begin.</p>
        <p id="timer" class="timer">00:00</p>
      </section>

      <section class="panel" id="transcript-panel" hidden>
        <h2>Responses</h2>
        <div id="responses"></div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>

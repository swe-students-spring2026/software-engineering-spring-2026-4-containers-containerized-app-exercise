<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mock Interview - CollegeMaxxing</title>
  </head>
  <body>

    <!-- header -->
    <div>
      <span><a href="/">CollegeMaxxing</a></span>

      <span style="float: right;">
        {% if is_valid %}
          <a href="/dashboard">Dashboard</a>
          <a href="/logout">Log out</a>
        {% else %}
          <a href="/login">Log in</a>
          <a href="/signup">Sign up</a>
        {% endif %}
      </span>
    </div>

    <hr>

    <main>
      <!-- Interview start -->
      <div>
        <h1>Mock Interview</h1>
        <button id="start-session" type="button">Start Interview</button>
        <p id="session-status">No active session.</p>
      </div>

      <hr>

      <!-- Question -->
      <div id="question-panel" hidden>
        <h2>Questions</h2>
        <ol id="question-list"></ol>
      </div>

      <hr>

      <!-- Recording -->
      <div id="record-panel" hidden>
        <h2>Recorder</h2>
        <p>Record one response covering both questions. Maximum time: 5 minutes.</p>

        <div>
          <button id="record-button" type="button" disabled>
            Start Recording
          </button>
          <button id="stop-button" type="button" disabled>
            Stop Recording
          </button>
        </div>

        <p id="recording-status">Waiting to begin.</p>
        <p id="timer">00:00</p>
      </div>

      <hr>

      <!-- responses -->
      <div id="transcript-panel" hidden>
        <h2>Responses</h2>
        <div id="responses"></div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>

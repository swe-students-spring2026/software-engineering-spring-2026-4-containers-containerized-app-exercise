<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Dashboard</title>
    <style>
        body { margin: 40px; background: #f4f4f4; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Machine Learning Activity Dashboard</h1>
    <div id="activities">
        {% for item in activities %}
        <div class="card">
            <strong>{{ item.name }}</strong>: {{ item.message }}
        </div>
        {% endfor %}
    </div>
</body>
</html>

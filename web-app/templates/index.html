<!DOCTYPE html>
<html>
<head>
    <title>Sound Alert Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>Upload Audio or Video</h1>
    <p class="subtitle">Detect sound events and show timestamped alerts like “0:14 dog barking” during playback.</p>

    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
        <input type="file" name="media" accept="audio/*,video/*" required>
        <button type="submit">Analyze Clip</button>
    </form>
</div>

</body>
</html>

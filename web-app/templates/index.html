{% extends 'base.html' %}

{% block title %}Smart Garbage Classifier - Home{% endblock %}

{% block content %}
<div class="container">
    <h1>Smart Garbage Classifier</h1>
    <p style="text-align:center; font-size:18px;">Upload an image and let AI classify your garbage</p>

    <div class="upload-area">
        <p style="font-size:18px; margin-bottom:20px;">📸 Select Garbage Image</p>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
        <button class="btn" onclick="document.getElementById('imageInput').click()">📁 Choose Image</button>
        <button class="btn" style="background:#ff9800; margin-left:15px;">📷 Open Camera</button>
    </div>

    <div style="text-align:center; margin:30px 0;">
        <button class="btn" style="font-size:18px; padding:16px 40px;" onclick="classifyGarbage()">
            🔍 Start Classification
        </button>
    </div>

    <div id="preview" style="text-align:center; margin-top:20px;"></div>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const preview = document.getElementById('preview');
        preview.innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}" 
                               style="max-width:420px; border-radius:15px; margin-top:15px;">`;
    });

    async function classifyGarbage() {
        const preview = document.getElementById('preview');
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) {
            alert("Please select an image first.");
            return;
        }

        const itemName = fileInput.files[0].name.split('.')[0].replace(/[-_]/g, ' ');
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('item', itemName);

        preview.innerHTML = '<p>Calling the AI model, please wait...</p>';

        try {
            const response = await fetch('/classify', {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                throw new Error(`Server returned ${response.status}`);
            }

            const data = await response.json();
            preview.innerHTML = `
                <div class="result-card" style="max-width:520px; margin:24px auto; padding:24px; background:#fff; border-radius:18px; box-shadow:0 18px 40px rgba(0,0,0,0.08); text-align:left;">
                    <h2>Classification Result</h2>
                    <p><strong>Item:</strong> ${data.item}</p>
                    <p><strong>Category:</strong> ${data.category}</p>
                    <p><strong>Bin:</strong> ${data.bin}</p>
                    <p><strong>Confidence:</strong> ${data.confidence}%</p>
                    <p><strong>Timestamp:</strong> ${data.timestamp}</p>
                    ${data.model_error ? `<p style="color:red;"><strong>Warning:</strong> ${data.model_error}</p>` : ''}
                </div>
            `;
        } catch (error) {
            preview.innerHTML = `<p style="color:red;">Failed to classify garbage: ${error.message}</p>`;
            console.error('Error during classification:', error);
        }
    }
</script>
{% endblock %}

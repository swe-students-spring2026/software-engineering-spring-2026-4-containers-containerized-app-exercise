<!DOCTYPE html>
<html>
<head>
    <title>Sound Alert Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>Upload Audio or Video</h1>

        <button>Analyze Clip</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Profile – Bird Detection Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <header class="header">
        <h1>Bird Detection Dashboard</h1>
        <p class="subtitle">Real-time bird sound detection</p>
    </header>

    <div class="login-box">
        <h2>Create Profile</h2>
        {% if error %}
            <p class="login-error">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/register">
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="login-field">
                <label for="password">Password <span class="field-hint">(min 6 characters)</span></label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="login-field">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required>
            </div>
            <button type="submit" class="start login-btn">Create Profile</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
    </div>

</body>
</html>

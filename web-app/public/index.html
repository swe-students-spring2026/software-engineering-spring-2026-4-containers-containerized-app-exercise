<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Doodle! Not Found</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <style>
        .content {
            
        }
        .title {
            text-align: center;
            font-size: 35px;
            font-weight: bold;
        }
        .spacer {
            height: 10px;
        }
        .canvas {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .top-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .button-undo {
            font-size: 20px;
            height: 30px;
        }
        .button-color {
            font-size: 20px;
            height: 30px;
        }
        .button-color-active {
            background-color: chocolate;
        }
        .button-upload {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .button-upload-inner {
            font-size: 20px;
            width: 200px;
            height: 50px;
        }
    </style>

    <body>
        <div class="content">
            <div class="title">Doodle! Not Found</div>
            <div class="spacer"></div>
            <div class="top-buttons">
                <button id="button-undo" onclick="undo()" class="button-undo">&#8592;</button>
                <button id="button-color-black" onclick="switchColor('black')" class="button-color button-color-active" style="color: black">&#9632;</button>
                <button id="button-color-red"   onclick="switchColor('red')" class="button-color" style="color: red">&#9632;</button>
                <button id="button-color-green" onclick="switchColor('green')" class="button-color" style="color: green">&#9632;</button>
                <button id="button-color-blue"  onclick="switchColor('blue')" class="button-color" style="color: blue">&#9632;</button>
            </div>
            <div class="spacer"></div>
            <div class="canvas"><canvas id="drawingCanvas" width="500" height="500" style="border:1px solid black;"></canvas></div>
            <div class="spacer"></div>
            <div class="button-upload"><button id="myButton" onclick="upload()" class="button-upload-inner">Upload</button></div>
        </div>
    </body>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currColor = 'black';
        
        let undoHistory = [];

        canvas.addEventListener('mousedown', (e) => {
            undoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            isDrawing = true;
            ctx.strokeStyle = currColor;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if(isDrawing) {
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        setInterval(() => {
            // TODO
        }, 500);

        function undo() {
            if(undoHistory.length == 0) return;
            let img = undoHistory.pop();
            ctx.putImageData(img, 0, 0);
        }

        function switchColor(color) {
            currColor = color;
            for(let e of document.getElementsByClassName("button-color")) {
                e.classList.remove("button-color-active");
            }
            document.getElementById("button-color-" + color).classList.add("button-color-active");
        }

        function upload() {
            console.log("Button was clicked!");
            const imageURL = canvas.toDataURL('image/png');
            // TODO: convert to bytes & send to server
            console.log(imageURL);
        }

    </script>
</html>

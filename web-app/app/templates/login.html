{% extends "base.html" %}

{% block title %}Login | MoodMirror{% endblock %}

{% block content %}
<section class="auth-wrapper">
  <div class="auth-card">
    <h1>Login</h1>
    <p class="subtitle">Sign in to view your focus and emotion history.</p>

    <form method="POST" class="auth-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <button type="submit" class="button-primary auth-submit">Login</button>
    </form>

    <p class="auth-footer">
      Need an account?
      <a href="{{ url_for('auth.signup') }}">Sign up</a>
    </p>
  </div>
</section>
{% endblock %}

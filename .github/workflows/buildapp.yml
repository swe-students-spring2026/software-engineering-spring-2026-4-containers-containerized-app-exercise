name: Web App CI

on:
  push:
  pull_request:


jobs:
  test-web-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    services:
      mongodb:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --python 3.11
          pipenv run pip install pytest pytest-flask pymongo flask-login
      - name: Run tests
        run: pipenv run python -m pytest tests/ -v
name: ML Client CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-ml-client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: machine-learning-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Create Pipenv environment
        run: pipenv --python 3.12

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run tests
        run: pipenv run pytest --cov=app --cov-fail-under=80

      - name: Build ML client Docker image
        run: docker build -t ml-client-test .
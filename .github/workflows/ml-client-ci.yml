name: ML Client Tests

on:
  push:
    branches: [main]
    paths:
      - "machine-learning-client/**"
  pull_request:
    branches: [main]
    paths:
      - "machine-learning-client/**"

jobs:
  test-ml-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipenv
        run: python -m pip install pipenv

      - name: Install dependencies
        working-directory: machine-learning-client
        run: pipenv install --dev

      - name: Run tests
        working-directory: machine-learning-client
        run: pipenv run pytest

      - name: Run coverage
        working-directory: machine-learning-client
        run: pipenv run coverage run -m pytest

      - name: Enforce coverage >= 80%
        working-directory: machine-learning-client
        run: pipenv run coverage report --fail-under=80
      
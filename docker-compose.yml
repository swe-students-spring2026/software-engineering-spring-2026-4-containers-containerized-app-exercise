version: "3.8"
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - 27017:27017

  web-app:
    build: ./web-app
    container_name: web-app
    ports:
      - "5001:5000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - ml-client

  ml-client:
    build: ./machine-learning-client
    container_name: ml-client
    image: eyewrite-ml
    env_file:
      - .env
    depends_on:
      - mongodb
    ports:
      - "5002:5002"


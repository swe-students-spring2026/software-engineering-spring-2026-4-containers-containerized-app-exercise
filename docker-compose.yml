services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - app-network
  machine-learning-client:
    build:
      context: ./machine-learning-client
    container_name: ml-client
    environment:
      - MONGO_URI=mongodb://mongodb:27017/appdb
    depends_on:
      - mongodb
    networks:
      - app-network

  web-app:
    build:
      context: ./web-app
    container_name: web-app
    ports:
      - "3000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/appdb
    depends_on:
      - mongodb
    networks:
      - app-network

networks:
  app-network:
    driver: bridge


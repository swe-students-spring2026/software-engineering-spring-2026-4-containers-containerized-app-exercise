services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  ml-client:
    build: ./machine-learning-client
    container_name: ml-client
    ports:
      - "5002:5000"
    depends_on:
      - mongodb

  web-app:
    build: ./web-app
    container_name: web-app
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - ML_CLIENT_URL=http://ml-client:5000
    depends_on:
      - mongodb
      - ml-client

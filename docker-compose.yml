services:
  machine-learning-client:
    build:
      context: ./machine-learning-client
    container_name: ml-client
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - app-network

  web-app:
    build:
      context: ./web-app
    container_name: web-app
    ports:
      - "3000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
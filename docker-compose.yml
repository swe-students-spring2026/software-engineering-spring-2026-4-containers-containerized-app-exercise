services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  ml-client:
    build: ./machine-learning-client
    container_name: ml-client
    depends_on:
      - mongodb
    env_file:
      - .env
    volumes:
      - shared_audio:/app/uploads

  web-app:
    build: ./web-app
    container_name: web-app
    depends_on:
      - mongodb
    env_file:
      - .env
    ports:
      - "5001:5000"
    volumes:
      - shared_audio:/app/uploads

volumes:
  mongodb_data:
  shared_audio:
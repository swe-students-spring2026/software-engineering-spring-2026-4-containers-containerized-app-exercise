services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret 

  machine-learning-client:
    build: ./machine-learning-client
    container_name: machine-learning-client
    depends_on:
      - mongo
  
  web-app:
    build: ./web-app
    depends_on:
      - mongo
    ports:
      - "8080:5000"    
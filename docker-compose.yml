services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - app-network

  machine-learning-client:
    build:
      context: ./machine-learning-client
    container_name: ml-client
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DBNAME=${MONGO_DBNAME}
      - CAPTURE_INTERVAL_SECONDS=${CAPTURE_INTERVAL_SECONDS}
    networks:
      - app-network

  web-app:
    build:
      context: ./web-app
    container_name: web-app
    depends_on:
      - mongodb
    ports:
      - "3000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DBNAME=${MONGO_DBNAME}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  machine-learning-client:
    build: ./machine-learning-client
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=ocean_pulse
    volumes:
      - ./img:/shared/img

  web-app:
    build: ./web-app
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=ocean_pulse

volumes:
  mongo-data:
